aiChat:
  post:
    tags:
      - AI
    summary: Chat với AI
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Plan học React 30 ngày
              conversationId:
                type: string
                description: Nếu truyền vào sẽ append message vào conversation hiện tại
              model:
                type: string
                example: llama-3.1-8b-instant
              temperature:
                type: number
                example: 0.7
              maxTokens:
                type: number
                example: 512
            required:
              - message
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                reply:
                  type: string
                conversationId:
                  type: string
                model:
                  type: string
                usage:
                  type: object
                  properties:
                    promptTokens:
                      type: number
                    completionTokens:
                      type: number
                    totalTokens:
                      type: number
              required:
                - reply
                - conversationId
      "400":
        description: Dữ liệu không hợp lệ
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "401":
        description: Chưa đăng nhập / token không hợp lệ
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "403":
        description: Không có quyền truy cập
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "429":
        description: Rate limit / quota
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "500":
        description: Lỗi hệ thống
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "501":
        description: Chức năng chưa triển khai
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"

aiChatStream:
  post:
    tags:
      - AI
    summary: Chat với AI (stream SSE)
    description: |
      Server-Sent Events (SSE).
      - event `meta`: data { conversationId }
      - event `chunk`: data { delta }
      - event `done`: data { model, usage }
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Plan học React 30 ngày
              conversationId:
                type: string
                description: Nếu truyền vào sẽ append message vào conversation hiện tại
              model:
                type: string
                example: llama-3.1-8b-instant
              temperature:
                type: number
                example: 0.7
              maxTokens:
                type: number
                example: 512
            required:
              - message
    responses:
      "200":
        description: SSE stream
        content:
          text/event-stream:
            schema:
              type: string
      "400":
        description: Dữ liệu không hợp lệ
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "401":
        description: Chưa đăng nhập / token không hợp lệ
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "403":
        description: Không có quyền truy cập conversation
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "429":
        description: Rate limit / quota
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "500":
        description: Lỗi hệ thống
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"

aiConversations:
  get:
    tags:
      - AI
    summary: Danh sách conversations AI
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: limit
        schema:
          type: number
          example: 20
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                conversations:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      title:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                    required:
                      - id
                      - title
                      - createdAt
                      - updatedAt
              required:
                - conversations
      "401":
        description: Chưa đăng nhập / token không hợp lệ
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "501":
        description: Chức năng chưa triển khai
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"

aiConversationById:
  get:
    tags:
      - AI
    summary: Chi tiết conversation AI
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      - in: query
        name: limit
        schema:
          type: number
          example: 100
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                    updatedAt:
                      type: string
                      format: date-time
                  required:
                    - id
                    - title
                    - createdAt
                    - updatedAt
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      role:
                        type: string
                        enum: [user, assistant, system]
                      content:
                        type: string
                      tokens:
                        type: number
                      createdAt:
                        type: string
                        format: date-time
                    required:
                      - id
                      - role
                      - content
                      - createdAt
              required:
                - conversation
                - messages
      "400":
        description: Id không hợp lệ
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "401":
        description: Chưa đăng nhập / token không hợp lệ
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"
      "501":
        description: Chức năng chưa triển khai
        content:
          application/json:
            schema:
              $ref: "../openapi.yml#/components/schemas/ErrorResponse"

aiTaskBreakdown:
  post:
    tags:
      - AI
    summary: AI breakdown task
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                example: Build portfolio website
              deadline:
                type: string
                format: date-time
            required:
              - title
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      title:
                        type: string
                      status:
                        type: string
                        enum: [todo, in_progress, completed, cancelled]
                    required:
                      - title
                      - status
              required:
                - steps
      "400":
        description: Dữ liệu không hợp lệ
        content:
          application/json:
