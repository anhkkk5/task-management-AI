name: Backend CI + Render Deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "config/**"
      - "openapi/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "Dockerfile"
      - "render.yaml"
      - ".github/workflows/backend-render.yml"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run ts.check

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t ai-task-management-be:ci .

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
